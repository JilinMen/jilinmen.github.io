headline: "Welcome!"
summary: >
  I am a Postdoctoral Researcher at The University of Alabama,
  working with Dr. [Hongxing Liu](https://geography.ua.edu/people/hongxing-liu/).
  My research develops remote sensing and machine learning methods for aquatic
  environments, with an emphasis on atmospheric correction, water quality
  retrieval, and scalable monitoring with satellite and cloud-computing systems.

news:
  - date: "2026"
    text: "Our paper 'RS-WaterQuality Mapper: an open-source water quality remote sensing toolbox in QGIS' has been published on Earth Science Informatics."
  - date: "2026"
    text: "Invited talk: *Inland and water quality monitoring using remote sensing and physics-informed deep learning* at The University of Alabama."
  - date: "2026"
    text: "New paper on ocean color atmospheric correction published in *IEEE Transactions on Geoscience and Remote Sensing*."
  - date: "2025"
    text: "Presented cloud-based water quality mapping work at AGU Fall Meeting in New Orleans."
  - date: "2025"
    text: "Led a workshop on water quality mapping with Google Earth Engine for the NASA SERVIR project."
  - date: "2025"
    text: "Guest Editor for a *Remote Sensing* special issue on water quality monitoring."

apps:
  - name: "Global-RSWQmonitor"
    description: "A cloud-based global water quality remote sensing platform powered by Google Earth Engine for rapid mapping with Landsat and Sentinel imagery."
    url: "https://watersensing-water-quality-monitoring-pro.hf.space/voila/render/Global-RSWQmonitor.ipynb"
  - name: "PIDL for Water Quality"
    description: "A physics-informed deep learning tool for water quality parameter retrieval from remote sensing data."
    url: "https://huggingface.co/spaces/WaterSensing/PIDL_for_Water_Quality"
  - name: "OC_3S: Global Water Optical Classification & Scoring System"
    description: "Water types, optical classification, and spectral scores for global water optical analysis."
    url: "https://watersensing-oc-3s.hf.space/"

